<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kingdom of Law – AI Court</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --dark: #050b12;
  --royal: #0c1f33;
  --gold: #c9a24d;
  --gold-light: #e6c77b;
  --paper: #f5f1e8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #1b3553, #050b12 70%);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  color: var(--paper);
}

.chatbot {
  width: 430px;
  background: linear-gradient(180deg, #0f2740, #071320);
  border: 3px solid var(--gold);
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(201,162,77,0.35);
  overflow: hidden;
}

.header {
  background: linear-gradient(180deg, #1a3a5c, #0c1f33);
  padding: 18px;
  text-align: center;
  border-bottom: 2px solid var(--gold);
  font-family: 'Cinzel', serif;
}
.header h1 { font-size: 1.4rem; color: var(--gold-light); }
.header p { font-size: 0.75rem; color: #d2c08f; }

.chat {
  height: 420px;
  padding: 16px;
  overflow-y: auto;
  background: rgba(0,0,0,0.25);
}

.msg {
  max-width: 85%;
  padding: 12px 14px;
  margin-bottom: 14px;
  border-radius: 14px;
  font-size: 0.85rem;
  line-height: 1.4;
}

.bot {
  background: linear-gradient(135deg, #1f3d5c, #12263b);
  border-left: 3px solid var(--gold);
}

.user {
  background: linear-gradient(135deg, #d6b15c, #a88232);
  color: #1b1b1b;
  margin-left: auto;
  border-right: 3px solid #fff1c2;
}

.input-box {
  display: flex;
  gap: 8px;
  padding: 12px;
  background: #050b12;
  border-top: 2px solid var(--gold);
}

.input-box input {
  flex: 1;
  padding: 10px;
  background: #0f2135;
  border: 1px solid var(--gold);
  border-radius: 10px;
  color: var(--paper);
}

.input-box button {
  padding: 10px 16px;
  background: linear-gradient(135deg, #e6c77b, #b8943f);
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}

.footer {
  text-align: center;
  font-size: 0.6rem;
  padding: 6px;
  font-family: 'Cinzel', serif;
  color: #bfae7c;
  background: #04080d;
}
</style>
</head>

<body>

<div class="chatbot">
  <div class="header">
    <h1>👑 THE KINGDOM OF LAW</h1>
    <p>An AI Court for the People</p>
  </div>

  <div class="chat" id="chat">
    <div class="msg bot">
      Welcome to the Kingdom of Law. How may justice serve you today?
    </div>
  </div>

  <div class="input-box">
    <input id="userInput" type="text" placeholder="Present your legal query…" />
    <button onclick="sendMessage()">Send</button>
  </div>

  <div class="footer">Veritas • Lex • Justitia</div>
</div>

<script>
/* 🔥 RENDER BACKEND URL (DEPLOYED) */
const BACKEND_URL = "https://global-ai-legal-assistant.onrender.com/chat";

async function sendMessage() {
  const input = document.getElementById("userInput");
  const chat = document.getElementById("chat");
  const message = input.value.trim();

  if (!message) return;

  chat.innerHTML += `<div class="msg user">${message}</div>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "⚖ The Court AI is deliberating…";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: message,
        country: "india",
        role: "citizen"
      })
    });

    const data = await res.json();
    chat.removeChild(typing);

    chat.innerHTML += `<div class="msg bot">${data.response}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    chat.removeChild(typing);
    chat.innerHTML += `<div class="msg bot">⚠ Court server is waking up. Please try again.</div>`;
  }
}
</script>

</body>
</html>
