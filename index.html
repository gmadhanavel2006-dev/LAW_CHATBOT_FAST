<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Royal AI Law Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>👑 Royal AI Law Chatbot</h1>

    <label>📝 Describe Your Legal Issue</label>
    <textarea id="issue" rows="4" placeholder="Example: My phone was stolen"></textarea>

    <label>🌍 Country</label>
    <select id="country">
      <option value="india">India</option>
      <option value="usa">USA</option>
      <option value="uk">UK</option>
    </select>

    <label>👤 User Role</label>
    <select id="role">
      <option value="citizen">Citizen</option>
      <option value="lawyer">Lawyer</option>
    </select>

    <button onclick="getLegalGuidance()">Get Legal Guidance</button>

    <div id="result"></div>
  </div>

  <!-- IMPORTANT: script at bottom -->
  <script src="script.js"></script>
</body>
</html>
