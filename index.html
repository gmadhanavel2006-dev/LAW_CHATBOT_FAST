<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>👑 Royal AI Law Chatbot</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .container {
      width: 650px;
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    h1 {
      text-align: center;
      color: #d4a017;
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }

    textarea,
    select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      color: #000;
      background: linear-gradient(to right, #f7d774, #d4a017);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .output {
      margin-top: 30px;
      background: #f9fafb;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .output h3 {
      margin-top: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>👑 Royal AI Law Chatbot</h1>

    <!-- LEGAL ISSUE INPUT -->
    <label for="message">📝 Describe Your Legal Issue</label>
    <textarea
      id="message"
      rows="4"
      placeholder="Example: Someone is threatening me online"
    ></textarea>

    <!-- COUNTRY -->
    <label for="country">🌍 Country</label>
    <select id="country">
      <option value="india">India</option>
      <option value="usa">USA</option>
      <option value="uk">UK</option>
    </select>

    <!-- USER ROLE -->
    <label for="role">👤 User Role</label>
    <select id="role">
      <option value="citizen">Citizen</option>
      <option value="lawyer">Lawyer</option>
    </select>

    <!-- SUBMIT BUTTON -->
    <button onclick="getLegalGuidance()">Get Legal Guidance</button>

    <!-- OUTPUT -->
    <div class="output" id="output">
      <h3>⚖️ Legal Guidance</h3>
      <p>Response will appear here...</p>
    </div>
  </div>

  <!-- IMPORTANT: SCRIPT PATH FIXED FOR GITHUB PAGES -->
  <script src="frontend/script.js"></script>
</body>
</html>
